name: verify-template.yml
on:
  workflow_call:
    inputs:
      ide-code:
        description: 'IDE code to verify plugin against '
        required: true
        type: string

      java-version:
        description: 'Java version to use for verifying plugin'
        required: false
        type: number
        default: 21

jobs:
  verify:
    name: Verify plugin
    runs-on: ubuntu-latest
    steps:

      # Free GitHub Actions Environment Disk Space
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      # Check out the current repository
      - name: Fetch Sources
        uses: actions/checkout@v6

      # Set up the Java environment for the next steps
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: ${{ inputs.java-version }}

      # Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      # Run Verify Plugin task and IntelliJ Plugin Verifier tool
      - name: Run Plugin Verification tasks
        env:
          PLUGIN_VERIFY_IDE: ${{ inputs.ide-code }}
        run: ./gradlew :cmdlineargs-plugin:verifyPlugin

      # Collect Plugin Verifier Result
      - name: Collect Plugin Verifier Result
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: pluginVerifier-${{ inputs.ide-code }}-result
          path: ${{ github.workspace }}/build/cmdlineargs-plugin/reports/pluginVerifier
