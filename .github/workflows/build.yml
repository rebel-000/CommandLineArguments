name: Build
on:
  push:
    branches: [ dev ]

  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
  
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      - name: Fetch Sources
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Build plugin
        run: ./gradlew :cmdlineargs-plugin:buildPlugin

      - name: Prepare Plugin Artifact
        id: artifact
        shell: bash
        run: |
          cd ${{ github.workspace }}/build/cmdlineargs-plugin/distributions
          FILENAME=`ls *.zip`
          unzip "$FILENAME" -d content

          echo "filename=${FILENAME:0:-4}" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.filename }}
          path: ./build/cmdlineargs-plugin/distributions/content/*/*

  test:
    name: Test
    needs: [ build ]
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      - name: Fetch Sources
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Run Tests
        run: ./gradlew :cmdlineargs-plugin:check

      - name: Collect Tests Result
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: tests-result
          path: ${{ github.workspace }}/build/cmdlineargs-plugin/reports/tests

      - name: Upload Code Coverage Report
        uses: codecov/codecov-action@v5
        with:
          files: ${{ github.workspace }}/build/cmdlineargs-plugin/reports/kover/report.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  inspectCode:
    name: Inspect code
    needs: [ build ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: write
      pull-requests: write

    steps:
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      - name: Fetch Sources
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: Qodana - Code Inspection
        uses: JetBrains/qodana-action@v2025.1.1
        with:
          cache-default-branch-only: true

  verify_IU:
    name: Verify plugin (Idea)
    needs: [ build ]
    uses: './.github/workflows/verify-template.yml'
    with:
      ide-code: IU
      gradle-cache-disabled: true
      java-version: 21

  verify_CL:
    name: Verify plugin (Clion)
    needs: [ build ]
    uses: './.github/workflows/verify-template.yml'
    with:
      ide-code: CL
      gradle-cache-disabled: true
      java-version: 21

  verify_PY:
    name: Verify plugin (PyCharm)
    needs: [ build ]
    uses: './.github/workflows/verify-template.yml'
    with:
      ide-code: PY
      gradle-cache-disabled: true
      java-version: 21

  verify_RR:
    name: Verify plugin (Rust Rover)
    needs: [ build ]
    uses: './.github/workflows/verify-template.yml'
    with:
      ide-code: RR
      gradle-cache-disabled: true
      java-version: 21

  verify_RD:
    name: Verify plugin (Rider)
    needs: [ build ]
    uses: './.github/workflows/verify-template.yml'
    with:
      ide-code: RD
      gradle-cache-disabled: true
      java-version: 21

  releaseDraft:
    name: Release draft
    if: github.event_name != 'pull_request'
    needs: [ test, inspectCode, verify_IU, verify_CL, verify_PY, verify_RR, verify_RD ]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Fetch Sources
        uses: actions/checkout@v4

      - name: Remove Old Release Drafts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        run: |
          gh api repos/{owner}/{repo}/releases \
            --jq '.[] | select(.draft == true) | .id' \
            | xargs -I '{}' gh api -X DELETE repos/{owner}/{repo}/releases/{}

      - name: Create Release Draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        run: |
          VERSION=$(./gradlew :cmdlineargs-plugin:properties --property version --quiet --console=plain | tail -n 1 | cut -f2- -d ' ')
          RELEASE_NOTE="${{ github.workspace }}/build/tmp/release_note.txt"
          ./gradlew :cmdlineargs-plugin:getChangelog --unreleased --no-header --quiet --console=plain --output-file=$RELEASE_NOTE
          
          gh release create "v$VERSION" \
            --draft \
            --title "v$VERSION" \
            --notes-file $RELEASE_NOTE \
            --target ${{ github.ref_name }}
