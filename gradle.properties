plugin.id = com.github.rebel000.cmdlineargs
plugin.name = Command-Line Arguments
plugin.version = 3.0.0-dev
#plugin.repositoryUrl = ""

plugin.sinceBuild=253
plugin.untilBuild=253.*

plugin.platform.type = IU
#plugin.platform.version = 2025.2
#plugin.platform.version = 2025.3-RC1
plugin.platform.version = 253-EAP-SNAPSHOT
plugin.provider.rider.platform.version = 2025.3-RC1-SNAPSHOT

plugin.provider.clion.platform.type = CL
plugin.provider.clion.bundledPlugins = com.intellij.clion, com.intellij.clion-makefile
plugin.provider.python.platform.type = PC
plugin.provider.python.bundledPlugins = PythonCore
plugin.provider.rider.platform.type = RD
plugin.provider.rider.bundledPlugins = com.jetbrains.rider-cpp
plugin.provider.rust.platform.type = RR
plugin.provider.rust.bundledPlugins = com.jetbrains.rust
plugin.provider.sh.bundledPlugins = com.jetbrains.sh

plugin.verify.ides = IC, IU, CL, PC, RD, RR

gradle.version = 9.0.0
kotlin.stdlib.default.dependency = false
org.gradle.caching = true
org.gradle.configuration-cache = true
org.gradle.jvmargs = -Xmx4g
org.gradle.logging.level = INFO

intellijPlatform.caching.ides.enabled = true
